<!DOCTYPE html>
<html>
<head>
    <title>Edit Employee</title>

    <style>

        body{
            font-family:Arial,sans-serif;
            background:#f4f6f9;
            margin:0;
        }

        .header{
            background:#0f4c81;
            color:white;
            padding:20px;
            text-align:center;
        }

        .container{
            width:60%;
            margin:30px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        input, select{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        .btn{
            padding:12px 25px;
            background:#0f4c81;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .back-btn{
            display:inline-block;
            margin-bottom:20px;
            padding:10px 20px;
            background:#0f4c81;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

    </style>

</head>

<body>

<div class="header">
    <h1>Edit Employee</h1>
</div>

<div class="container">

    <a href="/employee-list/" class="back-btn">
        Back to Employee List
    </a>

    <form method="POST">

        {% csrf_token %}

        <input type="text"
       value="{{ employee.emp_name }}"
       readonly
       style="background:#e9ecef;">


        <input type="email"
       value="{{ employee.email }}"
       readonly
       style="background:#e9ecef;">


        <input type="number"
       value="{{ employee.experience }}"
       readonly
       style="background:#e9ecef;">


        <input type="text"
       value="{{ employee.primary_skill }}"
       readonly
       style="background:#e9ecef;">


        <input type="text"
       value="{{ employee.secondary_skill }}"
       readonly
       style="background:#e9ecef;">


        <input type="text"
               name="cm_name"
               value="{{ employee.cm_name }}"
               placeholder="CM Name"
               required>

        <!-- Profile Status Dropdown -->
        <select name="profile_status" required>

            <option value="Profile Shared"
                {% if employee.profile_status == "Profile Shared" %}selected{% endif %}>
                Profile Shared
            </option>

            <option value="TP-1 Pending"
                {% if employee.profile_status == "TP-1 Pending" %}selected{% endif %}>
                TP-1 Pending
            </option>

            <option value="TP-1 Selected"
                {% if employee.profile_status == "TP-1 Selected" %}selected{% endif %}>
                TP-1 Selected
            </option>

            <option value="Rejected"
                {% if employee.profile_status == "Rejected" %}selected{% endif %}>
                Rejected
            </option>

            <option value="TP-2 Selected"
                {% if employee.profile_status == "TP-2 Selected" %}selected{% endif %}>
                TP-2 Selected
            </option>

            <option value="Customer Selected"
                {% if employee.profile_status == "Customer Selected" %}selected{% endif %}>
                Customer Selected
            </option>

            <option value="Final Select Using Demand"
                {% if employee.profile_status == "Final Select Using Demand" %}selected{% endif %}>
                Final Select Using Demand
            </option>

            <option value="RAS In Progress"
                {% if employee.profile_status == "RAS In Progress" %}selected{% endif %}>
                RAS In Progress
            </option>

        </select>

        <input type="text"
               name="customer"
               value="{{ employee.customer }}"
               placeholder="Customer"
               required>

        <input type="text"
       value="{{ employee.project_owner }}"
       readonly
       style="background:#e9ecef;">
       

        <br><br>

        <div style="margin-top:20px;">

    <button
        type="submit"
        style="
            background:#0f4c81;
            color:white;
            padding:12px 20px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        ">
        Update Employee
    </button>

</form>

<form
    method="POST"
    action="/delete-employee/{{ employee.id }}/"
    style="display:inline;">

    {% csrf_token %}

    <button
        type="submit"
        onclick="return confirm('Are you sure you want to delete this employee?')"
        style="
            background:#dc3545;
            color:white;
            padding:12px 20px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            margin-left:10px;
        ">
        Delete Employee
    </button>

</form>

</div>

    </form>

</div>

</body>
</html>
