<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>

    <style>
        body{
            font-family:Arial,sans-serif;
            background:#f4f6f9;
            margin:0;
        }

        .header{
            background:#0f4c81;
            color:white;
            text-align:center;
            padding:20px;
        }

        .container{
            width:30%;
            margin:80px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        .btn{
            width:100%;
            padding:12px;
            background:#0f4c81;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .error{
            color:red;
            margin-bottom:15px;
        }
    </style>

</head>

<body>

<div class="header">
    <h1>User Sign Up</h1>
</div>

<div class="container">

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="email"
               name="email"
               placeholder="Email"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit" class="btn">
            Sign Up
        </button>

    </form>

</div>

</body>
</html>
